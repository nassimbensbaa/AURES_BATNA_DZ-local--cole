<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة الجود</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{font-family:'Cairo',sans-serif;box-sizing:border-box;}
body{margin:0;background:#f4f6f8;}

header{
  background:linear-gradient(135deg,#f59e0b,#f97316);
  color:white;
  text-align:center;
  padding:15px;
}
header h1{margin:0;font-size:22px;}
header p{margin:5px 0 0;font-size:13px;}

.container{display:flex;gap:10px;padding:10px;}

.products{
  flex:3;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}

.price{color:#f59e0b;font-weight:bold;}

.btn{
  width:100%;
  padding:6px;
  background:#f59e0b;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.cart{
  flex:1;
  background:white;
  border-radius:12px;
  padding:10px;
  position:sticky;
  top:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.item{
  border-bottom:1px solid #eee;
  padding:6px 0;
  font-size:13px;
}

.qty button{
  padding:2px 6px;
  border:none;
  background:#ddd;
  border-radius:5px;
  cursor:pointer;
}

.order-btn{
  width:100%;
  margin-top:10px;
  padding:8px;
  background:linear-gradient(135deg,#f59e0b,#f97316);
  color:white;
  border:none;
  border-radius:10px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:15px;
  border-radius:12px;
  width:90%;
  max-width:350px;
}

.modal-content input{
  width:100%;
  margin:5px 0;
  padding:8px;
  border:1px solid #ddd;
  border-radius:8px;
}

footer{
  text-align:center;
  padding:15px;
  background:#fff;
  border-top:1px solid #eee;
  font-size:14px;
}

@media(max-width:900px){
.container{flex-direction:column;}
}
</style>
</head>

<body>

<header>
  <h1>📚 مكتبة الجود</h1>
  <p>أول مكتبة إلكترونية في الجزائر – ولاية باتنة</p>
</header>

<div class="container">

  <div class="products" id="products"></div>

  <div class="cart">
    <h3>🛒 السلة</h3>
    <div id="cartItems"></div>

    <p>
      المجموع: <b id="total">0</b> دج<br>
      التوصيل: 200 دج<br>
      الإجمالي: <b id="final">0</b> دج
    </p>

    <button class="order-btn" onclick="openOrder()">تأكيد الطلب</button>
  </div>

</div>

<!-- الطلب -->
<div class="modal" id="orderModal">
  <div class="modal-content">
    <h3>بيانات الزبون</h3>
    <input id="firstName" placeholder="الاسم">
    <input id="lastName" placeholder="اللقب">
    <input id="phone" placeholder="رقم الهاتف">
    <input id="address" placeholder="العنوان">
    <button class="btn" onclick="sendOrder()">إرسال</button>
  </div>
</div>

<!-- نجاح -->
<div class="modal" id="successModal">
  <div class="modal-content">
    <h3>✅ تم تسجيل الطلب</h3>
    <p>سوف يتم الاتصال بك من مصلحة الزبائن</p>
    <button class="btn" onclick="closeSuccess()">حسناً</button>
  </div>
</div>

<footer>
📞 مصلحة الزبائن: 0659418701 <br>
🚚 توصيل في نفس اليوم
</footer>

<script>

/* ✅ الصور من مجلد images */
const PRODUCTS = [
  {name:"كراس 96 صفحة",price:120,image:"images/nassim01.jpg"},
  {name:"قلم أزرق",price:30,image:"images/nassim02.jpg"},
  {name:"مسطرة",price:40,image:"images/nassim02.jpg"},
  {name:"ممحاة",price:50,image:"images/nassim03.jpg"}
];

const SHIPPING = 200;
let cart = [];

function renderProducts(){
let html="";
PRODUCTS.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<div class="price">${p.price} دج</div>
<button class="btn" onclick="add(${i})">إضافة</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function add(i){
let p=PRODUCTS[i];
let f=cart.find(x=>x.name===p.name);

if(f) f.qty++;
else cart.push({...p,qty:1});

updateCart();
}

function updateCart(){
let html="";
let total=0;

cart.forEach((p,i)=>{
let sub=p.price*p.qty;
total+=sub;

html+=`
<div class="item">
<b>${p.name}</b><br>
${p.price} × ${p.qty} = ${sub}

<div class="qty">
<button onclick="change(${i},-1)">-</button>
<button onclick="change(${i},1)">+</button>
</div>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("final").innerText=total+SHIPPING;
}

function change(i,v){
cart[i].qty+=v;
if(cart[i].qty<=0) cart.splice(i,1);
updateCart();
}

function openOrder(){
if(cart.length===0){alert("السلة فارغة");return;}
document.getElementById("orderModal").style.display="flex";
}

function sendOrder(){
let ph = phone.value;

if(!/^0(5|6|7)[0-9]{8}$/.test(ph)){
alert("رقم غير صحيح");
return;
}

cart=[];
updateCart();

document.getElementById("orderModal").style.display="none";
document.getElementById("successModal").style.display="flex";
}

function closeSuccess(){
document.getElementById("successModal").style.display="none";
}

renderProducts();
updateCart();

</script>

</body>
</html>
