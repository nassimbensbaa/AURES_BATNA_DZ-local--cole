<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة الجود</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{font-family:'Cairo',sans-serif;box-sizing:border-box;}
body{margin:0;background:#f4f6f8;}

header{
text-align:center;
padding:10px;
background:white;
border-bottom:2px solid #eee;
}

header h1{color:#f59e0b;margin:0;}

.container{display:flex;gap:10px;padding:10px;}

.products{
flex:3;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
border-radius:10px;
}

.price{color:#f59e0b;font-weight:bold;}

.btn{
width:100%;
padding:6px;
background:#f59e0b;
color:white;
border:none;
border-radius:8px;
margin-top:5px;
}

.cart{
flex:2;
background:white;
padding:10px;
border-radius:10px;
height:85vh;
overflow:auto;
position:sticky;
top:10px;
}

.item{border-bottom:1px solid #eee;padding:8px 0;}

.qty{display:flex;gap:5px;align-items:center;}

.qty button{background:#ddd;border:none;padding:3px 8px;}
</style>
</head>

<body>

<header>
<h1>📚 مكتبة الجود</h1>
</header>

<div class="container">

<div class="products" id="products"></div>

<div class="cart">

<h3>🛒 السلة</h3>

<div id="cartItems"></div>

<hr>

المجموع: <b id="total">0</b><br>
الإجمالي: <b id="final">0</b>

<button class="btn" onclick="sendOrder()">🧾 طلب</button>

</div>

</div>

<script>

let PRODUCTS=[];
let cart=[];

/* LOAD STOCK */
async function loadProducts(){
const res = await fetch("/api/products");
PRODUCTS = await res.json();
render();
}

/* RENDER */
function render(){

let html="";

PRODUCTS.forEach((p,i)=>{

html+=`
<div class="card">

<img src="${p.image}">
<h4>${p.name}</h4>

<div>ID: ${p.id}</div>

<div class="price">${p.price} دج</div>

<div>📦 ${p.qty}</div>
`;

if(p.qty<=0){
html+=`<div style="color:red">❌ غير متوفر</div>`;
}else{
html+=`<button class="btn" onclick="add(${i})">إضافة</button>`;
}

html+=`</div>`;
});

document.getElementById("products").innerHTML=html;
}

/* CART */
function add(i){
let p=PRODUCTS[i];
let f=cart.find(x=>x.id===p.id);

if(f) f.qty++;
else cart.push({...p,qty:1});

updateCart();
}

function updateCart(){

let html="";
let total=0;

cart.forEach((p,i)=>{

total+=p.price*p.qty;

html+=`
<div class="item">
<b>${p.name}</b><br>
${p.price} × ${p.qty}

<div class="qty">
<button onclick="change(${i},-1)">-</button>
<span>${p.qty}</span>
<button onclick="change(${i},1)">+</button>
</div>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("final").innerText=total+200;
}

function change(i,v){
cart[i].qty+=v;
if(cart[i].qty<=0) cart.splice(i,1);
updateCart();
}

/* ORDER */
async function sendOrder(){

await fetch("/api/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
firstName:"test",
lastName:"test",
phone:"000",
address:"test",
shipping:200,
products:cart
})
});

cart=[];
updateCart();
alert("تم الطلب");
}

/* INIT */
loadProducts();

</script>

</body>
</html>
