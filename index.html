<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة الجود</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{font-family:'Cairo',sans-serif;box-sizing:border-box;}

body{
margin:0;
background:#f4f6f8;
}

/* ===== HEADER ===== */
header{
position:sticky;
top:0;
z-index:1000;
background:#fff;
padding:10px;
border-bottom:2px solid #eee;
}
header img{
width:100%;
max-height:120px;
object-fit:contain;
}

/* ===== LAYOUT ===== */
.container{
display:flex;
gap:10px;
padding:10px;
}

/* ===== PRODUCTS ===== */
.products{
flex:3;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
}

.card{
background:#fff;
padding:10px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:170px;
object-fit:contain;
}

.btn{
width:100%;
padding:6px;
background:#f59e0b;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

/* ===== CART ===== */
.cart{
flex:2;
background:#fff;
border-radius:10px;
height:85vh;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.cart-header{
position:sticky;
top:0;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
z-index:10;
}

.cart-header button{
background:#f59e0b;
color:#fff;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

#cartItems{
flex:1;
overflow-y:auto;
padding:10px;
}

.item{
background:#fff;
padding:10px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
font-size:13px;
}

.cart-row{
display:flex;
justify-content:space-between;
align-items:center;
}

/* ===== TOTAL ===== */
.cart-footer{
padding:10px;
border-top:1px solid #eee;
}

/* ===== SERVICES ===== */
.services{
padding:15px;
background:#fff;
margin-top:10px;
text-align:center;
}

.service-boxes{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.service{
background:#f4f6f8;
padding:10px;
border-radius:10px;
width:160px;
font-size:13px;
}

/* ===== MODAL ===== */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:#fff;
padding:15px;
border-radius:10px;
width:90%;
max-width:420px;
max-height:90vh;
overflow-y:auto;
position:relative;
}

.close{
position:absolute;
top:8px;
left:10px;
cursor:pointer;
}

/* ===== RECEIPT ===== */
#receipt{
background:#fff;
padding:10px;
border-radius:10px;
text-align:right;
}
</style>
</head>

<body>

<header>
<img src="images/logo.png">
</header>

<div class="container">

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart">

<div class="cart-header">
<div>🛒 السلة</div>
<button onclick="openOrder()">🧾 طلب</button>
</div>

<div id="cartItems"></div>

<div class="cart-footer">
المجموع: <b id="total">0</b> دج<br>
التوصيل: 200 دج<br>
الإجمالي: <b id="final">0</b> دج
</div>

</div>
</div>

<!-- SERVICES -->
<div class="services">
<h3>✨ خدماتنا</h3>

<div class="service-boxes">
<div>🚚 توصيل سريع</div>
<div>💰 دفع عند الاستلام</div>
<div>📞 دعم الزبائن</div>
<div>⭐ جودة عالية</div>
</div>
</div>

<!-- ORDER -->
<div class="modal" id="orderModal">
<div class="modal-content">

<span class="close" onclick="closeOrder()">✖</span>

<h3>تأكيد الطلب</h3>

<input id="firstName" placeholder="الاسم">
<input id="lastName" placeholder="اللقب">
<input id="phone" placeholder="الهاتف">
<input id="address" placeholder="العنوان">

<button class="btn" onclick="sendOrder()">تأكيد</button>

</div>
</div>

<!-- SUCCESS -->
<div class="modal" id="successModal">
<div class="modal-content">

<span class="close" onclick="closeSuccess()">✖</span>

<h3 style="color:#f59e0b">✔ تم تأكيد الطلب</h3>

<p>تحميل وصل الطلب</p>

<div id="receipt"></div>

<button class="btn" onclick="downloadReceipt()">📸 تحميل الوصل</button>

</div>
</div>

<script>

let PRODUCTS=[];
let cart=[];

async function loadProducts(){
const res=await fetch("/api/products");
PRODUCTS=await res.json();
renderProducts();
}

function renderProducts(){
let html="";
PRODUCTS.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<div>${p.price} دج</div>
<button class="btn" onclick="add(${i})">إضافة</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function add(i){
let p=PRODUCTS[i];
let f=cart.find(x=>x.id===p.id);
if(f) f.qty++;
else cart.push({...p,qty:1});
updateCart();
}

function updateCart(){
let html="";
let total=0;

cart.forEach(p=>{
total+=p.price*p.qty;
html+=`
<div class="item">
<b>${p.name}</b>
<div class="cart-row">
<div>${p.qty} × ${p.price}</div>
<div>${p.price*p.qty} دج</div>
</div>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("final").innerText=total+200;
}

function openOrder(){
document.getElementById("orderModal").style.display="flex";
}

function closeOrder(){
document.getElementById("orderModal").style.display="none";
}

function closeSuccess(){
document.getElementById("successModal").style.display="none";
}

function sendOrder(){

let html="";
cart.forEach(p=>{
html+=`<div>${p.name} × ${p.qty}</div>`;
});

document.getElementById("receipt").innerHTML=html;

cart=[];
updateCart();

document.getElementById("orderModal").style.display="none";
document.getElementById("successModal").style.display="flex";
}

function downloadReceipt(){
html2canvas(document.getElementById("receipt")).then(canvas=>{
let a=document.createElement("a");
a.download="receipt.png";
a.href=canvas.toDataURL();
a.click();
});
}

loadProducts();

</script>

</body>
</html>
