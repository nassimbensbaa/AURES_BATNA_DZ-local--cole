<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة الجود</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{
font-family:'Cairo',sans-serif;
box-sizing:border-box;
}

body{
margin:0;
background:#f4f6f8;
}

/* ===== HEADER (ثابت) ===== */
header{
position:sticky;
top:0;
z-index:1000;
background:white;
text-align:center;
padding:8px;
border-bottom:2px solid #eee;
}

/* ===== LAYOUT ===== */
.container{
display:flex;
gap:10px;
padding:10px;
}

/* ===== PRODUCTS ===== */
.products{
flex:3;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:8px;
height:85vh;
overflow-y:auto;
}

.card{
background:white;
padding:8px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:150px;
object-fit:contain;
}

.card h4{
margin:3px 0;
font-size:13px;
}

.meta{
font-size:12px;
margin:2px 0;
}

.btn{
width:100%;
padding:6px;
background:#f59e0b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

/* ===== CART ===== */
.cart{
flex:2;
background:white;
border-radius:10px;
height:85vh;
display:flex;
flex-direction:column;
position:sticky;
top:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

/* ===== CART HEADER ثابت ===== */
.cart-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:2px solid #eee;
background:white;
}

.cart-header button{
background:#f59e0b;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

/* ===== CART ITEMS SCROLL ===== */
#cartItems{
flex:1;
overflow-y:auto;
padding:10px;
}

/* ===== ITEM ===== */
.item{
background:#fff;
border-radius:10px;
padding:8px;
margin-bottom:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
font-size:13px;
}

.item-name{
font-weight:bold;
margin-bottom:5px;
}

.cart-row{
display:flex;
justify-content:space-between;
align-items:center;
gap:8px;
flex-wrap:wrap;
}

.qty{
display:flex;
gap:5px;
align-items:center;
background:#f4f6f8;
padding:3px 6px;
border-radius:8px;
}

.qty button{
border:none;
background:#ddd;
padding:3px 8px;
border-radius:6px;
cursor:pointer;
}

/* ===== FOOTER CART ===== */
.cart-footer{
padding:10px;
border-top:2px solid #eee;
}

/* ===== MODAL ===== */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:15px;
border-radius:10px;
width:90%;
max-width:420px;
text-align:center;
}

/* ===== SERVICES ===== */
.services{
padding:15px;
text-align:center;
background:white;
margin-top:10px;
}

.service-boxes{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.service{
background:#f4f6f8;
padding:10px;
border-radius:10px;
width:150px;
font-size:12px;
}

/* ===== FOOTER ===== */
footer{
text-align:center;
padding:15px;
background:white;
margin-top:10px;
border-top:2px solid #eee;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
<img src="images/logo.png" style="width:100%;max-height:120px;object-fit:contain;">
</header>

<!-- MAIN -->
<div class="container">

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart">

<div class="cart-header">
<div>🛒 السلة</div>
<button onclick="openOrder()">🧾 الطلب</button>
</div>

<div id="cartItems"></div>

<div class="cart-footer">
المجموع: <b id="total">0</b> دج<br>
التوصيل: 200 دج<br>
الإجمالي: <b id="final">0</b> دج
</div>

</div>
</div>

<!-- ORDER -->
<div class="modal" id="orderModal">
<div class="modal-content">

<h3>تأكيد الطلب</h3>

<input id="firstName" placeholder="الاسم">
<input id="lastName" placeholder="اللقب">
<input id="phone" placeholder="الهاتف">
<input id="address" placeholder="العنوان">

<br><br>
<button class="btn" onclick="sendOrder()">تأكيد</button>

</div>
</div>

<!-- SUCCESS -->
<div class="modal" id="successModal">
<div class="modal-content">

<h2>✔ تم تأكيد الطلب</h2>

<div id="receipt">
<div style="color:#f59e0b;text-align:center">📚 مكتبة الجود</div>
<div id="receiptItems"></div>
<h3>الإجمالي: <span id="receiptTotal"></span></h3>
</div>

<br>
<button class="btn" onclick="downloadReceipt()">📥 تحميل الوصل</button>

</div>
</div>

<!-- SERVICES -->
<div class="services">
<h3 style="color:#f59e0b">✨ خدماتنا</h3>

<div class="service-boxes">
<div class="service">🚚 توصيل سريع</div>
<div class="service">💰 الدفع عند الاستلام</div>
<div class="service">📞 دعم الزبائن</div>
<div class="service">📦 جودة مضمونة</div>
</div>
</div>

<!-- FOOTER -->
<footer>
📞 0659418701
</footer>

<script>

let PRODUCTS=[];
let cart=[];

async function loadProducts(){
const res=await fetch("/api/products");
PRODUCTS=await res.json();
render();
}

function render(){
let html="";
PRODUCTS.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<div class="meta">${p.price} دج</div>
<button class="btn" onclick="add(${i})">إضافة</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function add(i){
let p=PRODUCTS[i];
let f=cart.find(x=>x.id===p.id);
if(f) f.qty++;
else cart.push({...p,qty:1});
update();
}

function update(){
let html="";
let total=0;

cart.forEach((p,i)=>{
let sub=p.price*p.qty;
total+=sub;

html+=`
<div class="item">
<div class="item-name">${p.name}</div>
<div class="cart-row">

<div class="qty">
<button onclick="chg(${i},-1)">-</button>
${p.qty}
<button onclick="chg(${i},1)">+</button>
</div>

<div>${sub} دج</div>

<button onclick="removeItem(${i})" class="delete-btn">🗑</button>

</div>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("final").innerText=total+200;
}

function chg(i,v){
cart[i].qty+=v;
if(cart[i].qty<=0) cart.splice(i,1);
update();
}

function openOrder(){
if(cart.length===0) return alert("السلة فارغة");
document.getElementById("orderModal").style.display="flex";
}

function sendOrder(){

let total=0;
let html="";

cart.forEach(p=>{
let sub=p.price*p.qty;
total+=sub;
html+=`<div>${p.name} = ${sub} دج</div>`;
});

document.getElementById("receiptItems").innerHTML=html;
document.getElementById("receiptTotal").innerText=total+200;

cart=[];
update();

document.getElementById("orderModal").style.display="none";
document.getElementById("successModal").style.display="flex";
}

function downloadReceipt(){
html2canvas(document.getElementById("receipt")).then(canvas=>{
let a=document.createElement("a");
a.download="receipt.png";
a.href=canvas.toDataURL();
a.click();
});
}

loadProducts();

</script>

</body>
</html>
