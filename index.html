<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر السلة</title>

<style>
body{font-family:Cairo;background:#f4f6f8;margin:0;display:flex}
.cart{width:260px;background:#fff;height:100vh;position:fixed;left:0;padding:10px;overflow:auto}
.main{margin-left:260px;padding:10px;width:100%}
.item{border-bottom:1px solid #eee;padding:6px}
button{cursor:pointer}
.btn{background:#f59e0b;color:#fff;padding:6px;border:none;width:100%}
.card{background:#fff;padding:10px;margin:5px;border-radius:8px}
</style>
</head>

<body>

<!-- 🛒 السلة -->
<div class="cart">

<h3>🛒 السلة</h3>
<div id="cartItems"></div>

<hr>

المجموع: <b id="total">0</b><br>
التوصيل: 200<br>
الإجمالي: <b id="final">0</b>

<hr>

<input id="firstName" placeholder="الاسم"><br><br>
<input id="lastName" placeholder="اللقب"><br><br>
<input id="phone" placeholder="الهاتف"><br><br>
<input id="address" placeholder="العنوان"><br><br>

<button class="btn" onclick="sendOrder()">إرسال الطلب</button>

</div>

<!-- المنتجات -->
<div class="main">
<div id="products"></div>
</div>

<script>

/* 🔥 رابط Google Script مباشرة */
const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbytv6JbE8cvmbuTi9sjIFkAQmRH8sDHOhFNCZkXkdfm9thQSAcCrzU5JmNxUnzbTJZZ5w/exec";

const PRODUCTS = [
  {name:"كراس", price:120},
  {name:"قلم", price:30},
  {name:"ممحاة", price:50}
];

let cart = [];

/* عرض المنتجات */
function renderProducts(){
  let html="";
  PRODUCTS.forEach((p,i)=>{
    html += `
      <div class="card">
        <h4>${p.name}</h4>
        <p>${p.price} دج</p>
        <button class="btn" onclick="add(${i})">إضافة</button>
      </div>
    `;
  });
  document.getElementById("products").innerHTML = html;
}

/* إضافة للسلة */
function add(i){
  let p = PRODUCTS[i];
  let f = cart.find(x=>x.name===p.name);

  if(f) f.qty++;
  else cart.push({...p, qty:1});

  updateCart();
}

/* تحديث السلة */
function updateCart(){
  let html="";
  let total=0;

  cart.forEach((p,i)=>{
    let sub=p.price*p.qty;
    total+=sub;

    html+=`
      <div class="item">
        ${p.name} x${p.qty} = ${sub}
        <button onclick="change(${i},-1)">-</button>
        <button onclick="change(${i},1)">+</button>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML=html;
  document.getElementById("total").innerText=total;
  document.getElementById("final").innerText=total+200;
}

/* تغيير الكمية */
function change(i,v){
  cart[i].qty+=v;
  if(cart[i].qty<=0) cart.splice(i,1);
  updateCart();
}

/* 🚀 إرسال مباشر إلى Google Sheets */
async function sendOrder(){

  if(cart.length===0){
    alert("السلة فارغة");
    return;
  }

  const total = Number(document.getElementById("final").innerText);

  const payload = {
    firstName: firstName.value,
    lastName: lastName.value,
    phone: phone.value,
    address: address.value,
    shipping: 200,
    total: total,
    products: cart
  };

  console.log("SENDING:", payload);

  try {
    const res = await fetch(GOOGLE_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    console.log("RESPONSE:", text);

    alert("تم إرسال الطلب ✔");

    cart = [];
    updateCart();

  } catch(err){
    alert("خطأ في الإرسال: " + err.message);
  }
}

renderProducts();
updateCart();

</script>

</body>
</html>
