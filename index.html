<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة الجود</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{font-family:'Cairo',sans-serif;box-sizing:border-box;}

body{
margin:0;
background:#f4f6f8;
}

/* ===== header ===== */
header{
text-align:center;
padding:10px;
background:white;
border-bottom:2px solid #eee;
}

header h1{margin:0;color:#f59e0b;}

/* ===== layout ===== */
.container{
display:flex;
gap:10px;
padding:10px;
}

/* ===== products ===== */
.products{
flex:3;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
border-radius:10px;
}

.price{color:#f59e0b;font-weight:bold;}
.old-price{color:#999;text-decoration:line-through;font-size:12px;margin-right:5px;}

.btn{
width:100%;
padding:6px;
background:#f59e0b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

/* ===== cart ===== */
.cart{
flex:1;
background:white;
padding:10px;
border-radius:10px;
height:85vh;
overflow:auto;
position:sticky;
top:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.item{
border-bottom:1px solid #eee;
padding:5px 0;
font-size:13px;
}

.qty button{
padding:2px 6px;
border:none;
background:#ddd;
border-radius:5px;
cursor:pointer;
}

.checkout-btn{
width:100%;
margin-top:10px;
padding:8px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

/* ===== modal ===== */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:15px;
border-radius:10px;
width:90%;
max-width:420px;
text-align:center;
}

/* ===== form (عمودي) ===== */
.form{
display:flex;
flex-direction:column;
gap:8px;
margin-top:10px;
}

.form input{
width:100%;
padding:8px;
border:1px solid #ddd;
border-radius:8px;
}

/* ===== receipt ===== */
#receipt{
background:#fff;
padding:10px;
border-radius:10px;
text-align:right;
}

.receipt-header{
text-align:center;
font-size:18px;
font-weight:bold;
color:#f59e0b;
margin-bottom:10px;
}

.receipt-footer{
text-align:center;
margin-top:10px;
font-size:13px;
color:#333;
}

/* ===== services ===== */
.services{
padding:15px;
text-align:center;
background:white;
margin-top:10px;
border-top:2px solid #eee;
}

.service-boxes{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-top:10px;
}

.service{
background:#f4f6f8;
padding:10px;
border-radius:10px;
width:160px;
font-size:13px;
}

/* ===== footer ===== */
footer{
text-align:center;
padding:15px;
background:white;
border-top:2px solid #eee;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>📚 مكتبة الجود</h1>
</header>

<div class="container">

<div class="products" id="products"></div>

<div class="cart">
<h3>🛒 السلة</h3>

<div id="cartItems"></div>

<hr>

<div>
المجموع: <b id="total">0</b> دج<br>
التوصيل: 200 دج<br>
الإجمالي: <b id="final">0</b> دج
</div>

<button class="checkout-btn" onclick="openOrder()">🧾 طلب</button>
</div>

</div>

<!-- ORDER -->
<div class="modal" id="orderModal">
<div class="modal-content">

<h3>تأكيد الطلب</h3>

<div class="form">
<input id="firstName" placeholder="الاسم">
<input id="lastName" placeholder="اللقب">
<input id="phone" placeholder="رقم الهاتف">
<input id="address" placeholder="العنوان">
</div>

<button class="btn" onclick="sendOrder()">تأكيد</button>

</div>
</div>

<!-- SUCCESS + IMAGE -->
<div class="modal" id="successModal">
<div class="modal-content">

<h2 style="color:#f59e0b">✔ تم تأكيد طلبكم</h2>

<p>سيتم الاتصال بكم من طرف مصلحة الزبائن.</p>

<!-- 📦 IMAGE RECEIPT -->
<div id="receipt">

<div class="receipt-header">📚 مكتبة الجود</div>

<div id="receiptItems"></div>

<hr>

<h3>الإجمالي: <span id="receiptTotal"></span> دج</h3>

<div class="receipt-footer">
شكراً لثقتكم ❤️<br>
📞 0659418701
</div>

</div>

<br>

<button class="btn" onclick="downloadReceipt()">📸 تحميل قائمة الطلب</button>

</div>
</div>

<!-- SERVICES -->
<div class="services">
<h3 style="color:#f59e0b">✨ خدماتنا</h3>

<div class="service-boxes">

<div class="service">🚚 توصيل سريع</div>
<div class="service">💰 الدفع عند الاستلام</div>
<div class="service">📞 دعم سريع</div>
<div class="service">📦 منتجات مضمونة</div>

</div>
</div>

<footer>
📞 0659418701
</footer>

<script>

const PRODUCTS=[
{name:"كراس 96",price:120,oldPrice:150,image:"images/nassim01.jpg"},
{name:"قلم أزرق",price:30,oldPrice:50,image:"images/nassim02.jpg"},
{name:"ممحاة",price:50,oldPrice:70,image:"images/nassim03.jpg"}
];

let cart=[];

/* products */
function renderProducts(){
let html="";
PRODUCTS.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>

<div>
<span class="price">${p.price} دج</span>
${p.oldPrice?`<span class="old-price">${p.oldPrice} دج</span>`:""}
</div>

<button class="btn" onclick="add(${i})">إضافة</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

/* add */
function add(i){
let p=PRODUCTS[i];
let f=cart.find(x=>x.name===p.name);
if(f) f.qty++;
else cart.push({...p,qty:1});
updateCart();
}

/* cart */
function updateCart(){
let html="";
let total=0;

cart.forEach((p,i)=>{
let sub=p.price*p.qty;
total+=sub;

html+=`
<div class="item">
<b>${p.name}</b><br>
${p.price} × ${p.qty} = ${sub}
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("final").innerText=total+200;
}

/* open */
function openOrder(){
if(cart.length===0){
alert("السلة فارغة");
return;
}
document.getElementById("orderModal").style.display="flex";
}

/* send */
async function sendOrder(){

if(!firstName.value||!lastName.value||!phone.value||!address.value){
alert("املأ كل الخانات");
return;
}

/* fill receipt */
let html="";
let total=0;

cart.forEach(p=>{
let sub=p.price*p.qty;
total+=sub;

html+=`
<div>
<b>${p.name}</b><br>
${p.price} × ${p.qty} = ${sub} دج
</div><hr>`;
});

document.getElementById("receiptItems").innerHTML=html;
document.getElementById("receiptTotal").innerText=total+200;

/* close form */
document.getElementById("orderModal").style.display="none";

/* send API */
await fetch("/api/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
firstName:firstName.value,
lastName:lastName.value,
phone:phone.value,
address:address.value,
shipping:200,
total:total+200,
products:cart
})
});

cart=[];
updateCart();

/* show success */
document.getElementById("successModal").style.display="flex";
}

/* download + close modal */
function downloadReceipt(){

const receipt=document.getElementById("receipt");

html2canvas(receipt).then(canvas=>{
let link=document.createElement("a");
link.download="commande.png";
link.href=canvas.toDataURL();
link.click();

/* 🔥 بعد التحميل تغلق النافذة */
document.getElementById("successModal").style.display="none";
});
}

renderProducts();
updateCart();

</script>

</body>
</html>
