<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر السلة الآمن</title>

<style>
body{margin:0;font-family:Cairo;background:#f4f6f8;display:flex}
.cart{width:260px;background:#fff;height:100vh;position:fixed;left:0;padding:10px;overflow:auto;border-right:1px solid #eee}
.main{margin-left:260px;padding:10px;width:100%}
.item{padding:6px;border-bottom:1px solid #eee;font-size:13px}
.card{background:#fff;padding:10px;margin:5px;border-radius:8px}
button{cursor:pointer}
.btn{width:100%;padding:8px;background:#f59e0b;color:#fff;border:none;border-radius:6px}
input{width:100%;padding:6px;margin:4px 0}
</style>
</head>

<body>

<!-- 🛒 السلة -->
<div class="cart">

<h3>🛒 السلة</h3>
<div id="cartItems"></div>

<hr>

المجموع: <b id="total">0</b><br>
التوصيل: 200<br>
الإجمالي: <b id="final">0</b>

<hr>

<input id="firstName" placeholder="الاسم">
<input id="lastName" placeholder="اللقب">
<input id="phone" placeholder="الهاتف">
<input id="address" placeholder="العنوان">

<button class="btn" onclick="sendOrder()">إرسال الطلب</button>

</div>

<!-- المنتجات -->
<div class="main">
<div id="products"></div>
</div>

<script>

/* المنتجات */
const PRODUCTS = [
  {name:"كراس", price:120},
  {name:"قلم", price:30},
  {name:"ممحاة", price:50}
];

let cart = [];

/* عرض المنتجات */
function renderProducts(){
  let html="";
  PRODUCTS.forEach((p,i)=>{
    html += `
      <div class="card">
        <h4>${p.name}</h4>
        <p>${p.price} دج</p>
        <button class="btn" onclick="add(${i})">إضافة</button>
      </div>
    `;
  });
  document.getElementById("products").innerHTML = html;
}

/* إضافة للسلة */
function add(i){
  let p = PRODUCTS[i];
  let f = cart.find(x=>x.name===p.name);

  if(f) f.qty++;
  else cart.push({...p, qty:1});

  updateCart();
}

/* تحديث السلة */
function updateCart(){
  let html="";
  let total=0;

  cart.forEach((p,i)=>{
    let sub = p.price * p.qty;
    total += sub;

    html += `
      <div class="item">
        ${p.name} × ${p.qty} = ${sub}
        <button onclick="change(${i},-1)">-</button>
        <button onclick="change(${i},1)">+</button>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = total;
  document.getElementById("final").innerText = total + 200;
}

/* تغيير الكمية */
function change(i,v){
  cart[i].qty += v;
  if(cart[i].qty <= 0) cart.splice(i,1);
  updateCart();
}

/* 🚀 الإرسال الآمن عبر Vercel API */
async function sendOrder(){

  if(cart.length === 0){
    alert("السلة فارغة");
    return;
  }

  const payload = {
    firstName: document.getElementById("firstName").value,
    lastName: document.getElementById("lastName").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    shipping: 200,
    total: document.getElementById("final").innerText,
    products: cart
  };

  try {
    const res = await fetch("/api/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if(data.ok){
      alert("تم إرسال الطلب ✔");
      cart = [];
      updateCart();
    } else {
      alert("فشل الإرسال ❌");
    }

  } catch(err){
    alert("خطأ في الاتصال: " + err.message);
  }
}

/* init */
renderProducts();
updateCart();

</script>

</body>
</html>
