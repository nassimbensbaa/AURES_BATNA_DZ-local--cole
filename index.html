<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة الجود</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{font-family:'Cairo',sans-serif;box-sizing:border-box;}

body{
margin:0;
background:#f4f6f8;
}

/* HEADER */
header{
background:white;
padding:10px;
border-bottom:2px solid #eee;
text-align:center;
}

header img{
width:100%;
max-height:140px;
object-fit:contain;
}

/* PRODUCTS */
.container{
display:flex;
gap:10px;
padding:10px;
}

.products{
flex:3;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.price{color:#f59e0b;font-weight:bold;}
.old-price{color:#999;text-decoration:line-through;font-size:12px;}

.btn{
width:100%;
padding:6px;
background:#f59e0b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

/* ========== BOTTOM SHEET CART ========== */
.cart-btn{
position:fixed;
bottom:20px;
left:20px;
width:55px;
height:55px;
border-radius:50%;
background:#f59e0b;
color:white;
border:none;
font-size:22px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
z-index:999;
cursor:pointer;
}

.cart-sheet{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:70%;
background:white;
border-radius:20px 20px 0 0;
box-shadow:0 -5px 20px rgba(0,0,0,0.2);
transition:0.3s;
z-index:1000;
padding:10px;
overflow:auto;
}

.cart-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.close{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:8px;
cursor:pointer;
}

/* ITEM */
.item{
background:#fff;
border-radius:12px;
padding:10px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.cart-row{
display:flex;
justify-content:space-between;
align-items:center;
gap:8px;
flex-wrap:wrap;
}

.qty{
display:flex;
align-items:center;
gap:5px;
background:#f4f6f8;
padding:3px 6px;
border-radius:8px;
}

.qty button{
border:none;
background:#ddd;
padding:3px 8px;
border-radius:6px;
cursor:pointer;
}

.delete-btn{
background:#ff3b30;
color:white;
border:none;
padding:5px 10px;
border-radius:8px;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:15px;
border-radius:10px;
width:90%;
max-width:420px;
}

/* FORM */
.form input{
width:100%;
padding:8px;
margin:5px 0;
border:1px solid #ddd;
border-radius:8px;
}

/* RECEIPT */
#receipt{
background:#fff;
padding:10px;
border-radius:10px;
}

/* SERVICES */
.services{
text-align:center;
padding:15px;
background:white;
margin-top:10px;
}

.service-boxes{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.service{
background:#f4f6f8;
padding:10px;
border-radius:10px;
width:160px;
}

/* FOOTER */
footer{
text-align:center;
padding:15px;
background:white;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<img src="images/logo.png">
</header>

<div class="container">
<div class="products" id="products"></div>
</div>

<!-- زر السلة -->
<button class="cart-btn" onclick="openCart()">🛒</button>

<!-- السلة الاحترافية -->
<div class="cart-sheet" id="cartSheet">

<div class="cart-header">
<h3>🛒 السلة</h3>
<button class="close" onclick="closeCart()">✖</button>
</div>

<div id="cartItems"></div>

<hr>

<div>
المجموع: <b id="total">0</b> دج<br>
التوصيل: 200 دج<br>
الإجمالي: <b id="final">0</b> دج
</div>

<button class="btn" onclick="openOrder()">🧾 طلب</button>

</div>

<!-- ORDER -->
<div class="modal" id="orderModal">
<div class="modal-content">

<h3>تأكيد الطلب</h3>

<div class="form">
<input id="firstName" placeholder="الاسم">
<input id="lastName" placeholder="اللقب">
<input id="phone" placeholder="الهاتف">
<input id="address" placeholder="العنوان">
</div>

<button class="btn" onclick="sendOrder()">تأكيد</button>

</div>
</div>

<!-- SUCCESS -->
<div class="modal" id="successModal">
<div class="modal-content">

<h2 style="color:#f59e0b">✔ تم الطلب</h2>

<div id="receipt">
<div id="receiptItems"></div>
<h3>الإجمالي: <span id="receiptTotal"></span></h3>
</div>

<button class="btn" onclick="downloadReceipt()">تحميل</button>

</div>
</div>

<!-- SERVICES -->
<div class="services">
<div class="service">🚚 توصيل سريع</div>
<div class="service">💰 الدفع عند الاستلام</div>
<div class="service">📞 دعم</div>
<div class="service">📦 جودة</div>
</div>

<footer>📞 0659418701</footer>

<script>

let PRODUCTS=[];
let cart=[];

async function loadProducts(){
let res=await fetch("/api/products");
PRODUCTS=await res.json();
renderProducts();
}

function renderProducts(){
let html="";
PRODUCTS.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<div class="price">${p.price} دج</div>
<button class="btn" onclick="add(${i})">إضافة</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function add(i){
let p=PRODUCTS[i];
let f=cart.find(x=>x.id===p.id);
if(f) f.qty++;
else cart.push({...p,qty:1});
updateCart();
openCart();
}

function updateCart(){
let html="";
let total=0;

cart.forEach((p,i)=>{
let sub=p.price*p.qty;
total+=sub;

html+=`
<div class="item">

<b>${p.name}</b>

<div class="cart-row">

<div class="qty">
<button onclick="change(${i},-1)">-</button>
<span>${p.qty}</span>
<button onclick="change(${i},1)">+</button>
</div>

<div>${sub} دج</div>

<button class="delete-btn" onclick="removeItem(${i})">🗑</button>

</div>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("final").innerText=total+200;
}

function change(i,v){
cart[i].qty+=v;
if(cart[i].qty<=0) cart.splice(i,1);
updateCart();
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

function openCart(){
document.getElementById("cartSheet").style.bottom="0";
}

function closeCart(){
document.getElementById("cartSheet").style.bottom="-100%";
}

function openOrder(){
document.getElementById("orderModal").style.display="flex";
}

function sendOrder(){
alert("تم الطلب");
cart=[];
updateCart();
closeCart();
}

function downloadReceipt(){
html2canvas(document.getElementById("receipt")).then(c=>{
let a=document.createElement("a");
a.download="order.png";
a.href=c.toDataURL();
a.click();
});
}

loadProducts();

</script>

</body>
</html>
