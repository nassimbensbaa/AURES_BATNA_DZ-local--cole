<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة الجود</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
font-family:'Cairo',sans-serif;
box-sizing:border-box;
}

body{
margin:0;
background:#f4f6f8;
}

/* HEADER */
header{
text-align:center;
padding:10px;
background:white;
border-bottom:2px solid #eee;
}

header h1{
margin:0;
color:#f59e0b;
}

/* LAYOUT */
.container{
display:flex;
gap:10px;
padding:10px;
}

/* PRODUCTS */
.products{
flex:3;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#f59e0b;
font-weight:bold;
}

.old-price{
color:#999;
text-decoration:line-through;
font-size:12px;
margin-right:5px;
}

/* BUTTON */
.btn{
width:100%;
padding:6px;
background:#f59e0b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

/* CART */
.cart{
flex:2;
background:white;
padding:10px;
border-radius:10px;
height:85vh;
overflow:auto;
position:sticky;
top:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.item{
border-bottom:1px solid #eee;
padding:8px 0;
font-size:13px;
}

.qty{
display:flex;
align-items:center;
gap:5px;
margin-top:5px;
}

.qty button{
padding:3px 8px;
border:none;
background:#ddd;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>📚 مكتبة الجود</h1>
</header>

<div class="container">

<div class="products" id="products"></div>

<div class="cart">

<h3>🛒 السلة</h3>

<div id="cartItems"></div>

<hr>

المجموع: <b id="total">0</b> دج<br>
الإجمالي: <b id="final">0</b> دج

<button class="btn" onclick="sendOrder()">🧾 طلب</button>

</div>

</div>

<script>

let PRODUCTS = [];
let cart = [];

/* LOAD STOCK */
async function loadProducts(){

const res = await fetch("/api/products");
PRODUCTS = await res.json();

render();
}

/* RENDER PRODUCTS */
function render(){

let html = "";

PRODUCTS.forEach((p,i)=>{

html += `
<div class="card">

<img src="${p.image}">

<h4>${p.name}</h4>

<div>ID: ${p.id}</div>

<div>
<span class="price">${p.price} دج</span>
${p.oldPrice ? `<span class="old-price">${p.oldPrice} دج</span>` : ""}
</div>

<div style="margin-top:5px">
📦 الكمية: ${p.qty}
</div>
`;

if(p.qty <= 0){
html += `<div style="color:red;font-weight:bold;">❌ غير متوفر</div>`;
}else{
html += `<button class="btn" onclick="add(${i})">إضافة</button>`;
}

html += `</div>`;
});

document.getElementById("products").innerHTML = html;
}

/* ADD TO CART */
function add(i){

let p = PRODUCTS[i];
let f = cart.find(x => x.id === p.id);

if(f) f.qty++;
else cart.push({...p, qty:1});

updateCart();
}

/* CART */
function updateCart(){

let html = "";
let total = 0;

cart.forEach((p,i)=>{

let sub = p.price * p.qty;
total += sub;

html += `
<div class="item">

<b>${p.name}</b><br>

${p.price} × ${p.qty} = ${sub}

<div class="qty">
<button onclick="change(${i},-1)">-</button>
<span>${p.qty}</span>
<button onclick="change(${i},1)">+</button>
</div>

</div>`;
});

document.getElementById("cartItems").innerHTML = html;
document.getElementById("total").innerText = total;
document.getElementById("final").innerText = total + 200;
}

function change(i,v){
cart[i].qty += v;
if(cart[i].qty <= 0) cart.splice(i,1);
updateCart();
}

/* SEND ORDER */
async function sendOrder(){

await fetch("/api/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
firstName:"test",
lastName:"test",
phone:"000",
address:"test",
shipping:200,
products:cart
})
});

cart = [];
updateCart();

alert("تم الطلب بنجاح");
}

/* INIT */
loadProducts();

</script>

</body>
</html>
