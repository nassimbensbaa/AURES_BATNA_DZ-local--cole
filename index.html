<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة الجود</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{font-family:'Cairo',sans-serif;box-sizing:border-box;}

body{
margin:0;
padding-top:140px;
background:#f4f6f8;
}

/* ===== HEADER FIXED ===== */
header{
position:fixed;
top:0;
right:0;
left:0;
z-index:1000;
background:white;
padding:8px;
border-bottom:2px solid #eee;
}

header img{
width:100%;
max-height:120px;
object-fit:contain;
}

/* ===== LAYOUT ===== */
.container{
display:flex;
gap:10px;
padding:10px;
align-items:flex-start;
}

/* ===== PRODUCTS SCROLL ONLY ===== */
.products{
flex:3;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
max-height:calc(100vh - 150px);
overflow-y:auto;
padding-right:5px;
}

/* ===== CARD ===== */
.card{
background:white;
padding:8px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:140px;
object-fit:contain;
}

.card h4{
margin:5px 0 3px 0;
font-size:13px;
}

.card .meta{
margin:2px 0;
font-size:11px;
line-height:1.2;
color:#333;
}

.price{color:#f59e0b;font-weight:bold;}
.old-price{color:#999;text-decoration:line-through;font-size:12px;margin-right:5px;}

.btn{
width:100%;
padding:6px;
background:#f59e0b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
font-size:13px;
}

/* ===== CART ===== */
.cart{
flex:2;
background:white;
border-radius:10px;
height:calc(100vh - 150px);
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 0 10px rgba(0,0,0,.1);
position:sticky;
top:130px;
}

/* ===== CART HEADER ===== */
.cart-header{
position: sticky;
top: 0;
z-index: 1000;
background: #fff;
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px;
border-bottom: 2px solid #eee;
box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.cart-header button{
background:#f59e0b;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

/* ===== CART ITEMS SCROLL ===== */
#cartItems{
flex:1;
overflow-y:auto;
padding:10px;
}

.item{
background:#fff;
border-radius:12px;
padding:10px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
font-size:13px;
}

.item-name{font-weight:bold;margin-bottom:5px;}

.cart-row{
display:flex;
justify-content:space-between;
align-items:center;
gap:8px;
flex-wrap:wrap;
}

.qty{
display:flex;
align-items:center;
gap:5px;
background:#f4f6f8;
padding:3px 6px;
border-radius:8px;
}

.qty button{
border:none;
background:#ddd;
padding:3px 8px;
border-radius:6px;
cursor:pointer;
}

.delete-btn{
background:#ff3b30;
color:white;
border:none;
padding:5px 10px;
border-radius:8px;
cursor:pointer;
}

/* ===== MODAL ===== */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:15px;
border-radius:10px;
width:90%;
max-width:420px;
text-align:center;
position:relative;
max-height:90vh;
overflow-y:auto;
}

.close{
position:absolute;
top:8px;
left:10px;
font-size:18px;
cursor:pointer;
color:#666;
background:white;
padding:2px 6px;
border-radius:5px;
}

/* ===== FORM ===== */
.form{
display:flex;
flex-direction:column;
gap:8px;
margin-top:10px;
}

.form input{
width:100%;
padding:8px;
border:1px solid #ddd;
border-radius:8px;
}

/* ===== FOOTER ===== */
footer{
text-align:center;
padding:15px;
background:white;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<img src="images/logo.png">
</header>

<div class="container">

<div class="products" id="products"></div>

<div class="cart">

  <div class="cart-header">
    <div>🛒 السلة</div>
    <button onclick="openOrder()">🧾 الطلب</button>
  </div>

  <div id="cartItems"></div>

  <div style="padding:10px;border-top:1px solid #eee;">
    المجموع: <b id="total">0</b> دج<br>
    التوصيل: 200 دج<br>
    الإجمالي: <b id="final">0</b> دج
  </div>

</div>

</div>

<!-- ORDER -->
<div class="modal" id="orderModal">
<div class="modal-content">
<span class="close" onclick="closeOrder()">✖</span>
<h3>تأكيد الطلب</h3>

<div class="form">
<input id="firstName" placeholder="الاسم">
<input id="lastName" placeholder="اللقب">
<input id="phone" placeholder="رقم الهاتف">
<input id="address" placeholder="العنوان">
</div>

<button class="btn" onclick="sendOrder()">تأكيد</button>
</div>
</div>

<script>
let PRODUCTS=[];
let cart=[];

async function loadProducts(){
const res=await fetch("/api/products");
PRODUCTS=await res.json();
renderProducts();
updateCart();
}

function renderProducts(){
let html="";
PRODUCTS.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<div class="meta">${p.price} دج</div>
<button class="btn" onclick="add(${i})">إضافة</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function add(i){
let p=PRODUCTS[i];
let f=cart.find(x=>x.id===p.id);
if(f) f.qty++;
else cart.push({...p,qty:1});
updateCart();
}

function updateCart(){
let html="";
let total=0;

cart.forEach((p,i)=>{
let sub=p.price*p.qty;
total+=sub;

html+=`
<div class="item">
<div class="item-name">${p.name}</div>
<div class="cart-row">
<div class="qty">
<button onclick="change(${i},-1)">-</button>
<span>${p.qty}</span>
<button onclick="change(${i},1)">+</button>
</div>
<div>${sub} دج</div>
<button class="delete-btn" onclick="removeItem(${i})">🗑</button>
</div>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("final").innerText=total+200;
}

function change(i,v){
cart[i].qty+=v;
if(cart[i].qty<=0) cart.splice(i,1);
updateCart();
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

function openOrder(){
document.getElementById("orderModal").style.display="flex";
}

function closeOrder(){
document.getElementById("orderModal").style.display="none";
}

function sendOrder(){
alert("تم إرسال الطلب");
}

loadProducts();
</script>

</body>
</html>
