<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة الجود</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  font-family:'Cairo',sans-serif;
  box-sizing:border-box;
}

body{
  margin:0;
  background:#f4f6f8;
}

/* ===== HEADER ===== */
header{
  background:linear-gradient(135deg,#f59e0b,#f97316);
  color:white;
  text-align:center;
  padding:15px;
}

header h1{
  margin:0;
  font-size:22px;
}

header p{
  margin:5px 0 0;
  font-size:13px;
}

/* ===== LAYOUT ===== */
.container{
  display:flex;
  gap:10px;
  padding:10px;
}

/* ===== PRODUCTS ===== */
.products{
  flex:3;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  color:#f59e0b;
  font-weight:bold;
}

.btn{
  width:100%;
  padding:6px;
  background:#f59e0b;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* ===== CART (RIGHT) ===== */
.cart{
  flex:1;
  background:white;
  border-radius:12px;
  padding:10px;
  height:fit-content;
  position:sticky;
  top:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.cart h3{
  margin-top:0;
}

.item{
  border-bottom:1px solid #eee;
  padding:6px 0;
  font-size:13px;
}

.qty button{
  padding:2px 6px;
  border:none;
  background:#ddd;
  border-radius:5px;
  cursor:pointer;
}

.total-box{
  margin-top:10px;
  font-size:14px;
}

/* ===== ORDER BUTTON ===== */
.order-btn{
  width:100%;
  margin-top:10px;
  padding:8px;
  background:linear-gradient(135deg,#f59e0b,#f97316);
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* ===== MODAL ===== */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.5);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content{
  background:white;
  padding:15px;
  border-radius:12px;
  width:90%;
  max-width:350px;
}

.modal-content input{
  width:100%;
  margin:5px 0;
  padding:8px;
  border:1px solid #ddd;
  border-radius:8px;
}

.modal-content button{
  width:100%;
  margin-top:8px;
}

/* ===== FOOTER ===== */
footer{
  text-align:center;
  padding:15px;
  margin-top:20px;
  background:#fff;
  border-top:1px solid #eee;
  font-size:14px;
}

/* MOBILE */
@media(max-width:900px){
.container{
  flex-direction:column;
}
.cart{
  position:relative;
}
}
</style>
</head>

<body>

<header>
  <h1>📚 مكتبة الجود</h1>
  <p>أول مكتبة إلكترونية في الجزائر – ولاية باتنة</p>
</header>

<div class="container">

  <!-- المنتجات -->
  <div class="products" id="products"></div>

  <!-- السلة -->
  <div class="cart">
    <h3>🛒 السلة</h3>
    <div id="cartItems"></div>

    <div class="total-box">
      المجموع: <b id="total">0</b> دج<br>
      التوصيل: 200 دج<br>
      الإجمالي: <b id="final">0</b> دج
    </div>

    <button class="order-btn" onclick="openOrder()">
      تأكيد الطلب
    </button>
  </div>

</div>

<!-- MODAL ORDER -->
<div class="modal" id="orderModal">
  <div class="modal-content">

    <h3>📦 معلومات الزبون</h3>

    <input id="firstName" placeholder="الاسم">
    <input id="lastName" placeholder="اللقب">
    <input id="phone" placeholder="رقم الهاتف">
    <input id="address" placeholder="العنوان">

    <button class="btn" onclick="sendOrder()">إرسال الطلب</button>
    <button class="btn" style="background:#999" onclick="closeOrder()">إغلاق</button>

  </div>
</div>

<!-- SUCCESS -->
<div class="modal" id="successModal">
  <div class="modal-content">
    <h3>✅ تم تسجيل الطلب</h3>
    <p>سوف يتم الاتصال بك من مصلحة الزبائن قريباً</p>
    <button class="btn" onclick="closeSuccess()">حسناً</button>
  </div>
</div>

<footer>
📞 مصلحة الزبائن: 0659418701 <br>
🚚 توصيل في نفس اليوم داخل الولاية
</footer>

<script>

/* المنتجات */
const PRODUCTS = [
  {name:"كراس 96 صفحة",price:120,image:"https://via.placeholder.com/150"},
  {name:"قلم أزرق",price:30,image:"https://via.placeholder.com/150"},
  {name:"مسطرة",price:40,image:"https://via.placeholder.com/150"},
  {name:"ممحاة",price:50,image:"https://via.placeholder.com/150"}
];

const SHIPPING = 200;
let cart = [];

/* عرض المنتجات */
function renderProducts(){
let html="";
PRODUCTS.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<div class="price">${p.price} دج</div>
<button class="btn" onclick="askQty(${i})">إضافة</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

/* طلب الكمية */
function askQty(i){
let q = prompt("أدخل الكمية:");
q = parseInt(q);

if(!q || q<=0) return;

let p = PRODUCTS[i];
let found = cart.find(x=>x.name===p.name);

if(found) found.qty += q;
else cart.push({...p,qty:q});

updateCart();
}

/* السلة */
function updateCart(){
let html="";
let total=0;

cart.forEach((p,i)=>{
let sub=p.price*p.qty;
total+=sub;

html+=`
<div class="item">
<b>${p.name}</b><br>
${p.price} × ${p.qty} = ${sub} دج

<div class="qty">
<button onclick="change(${i},-1)">-</button>
<button onclick="change(${i},1)">+</button>
<button onclick="removeItem(${i})">حذف</button>
</div>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("final").innerText=total+SHIPPING;
}

function change(i,v){
cart[i].qty+=v;
if(cart[i].qty<=0) cart.splice(i,1);
updateCart();
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

/* الطلب */
function openOrder(){
if(cart.length===0){
alert("السلة فارغة");
return;
}
document.getElementById("orderModal").style.display="flex";
}

function closeOrder(){
document.getElementById("orderModal").style.display="none";
}

/* تحقق الهاتف */
function validPhone(phone){
return /^(05|06|07)[0-9]{8}$/.test(phone);
}

/* إرسال */
function sendOrder(){

let fn = firstName.value.trim();
let ln = lastName.value.trim();
let ph = phone.value.trim();
let ad = address.value.trim();

if(!fn || !ln || !ph || !ad){
alert("املأ كل الخانات");
return;
}

if(!validPhone(ph)){
alert("رقم الهاتف غير صحيح");
return;
}

closeOrder();
document.getElementById("successModal").style.display="flex";

cart = [];
updateCart();
}

function closeSuccess(){
document.getElementById("successModal").style.display="none";
}

renderProducts();
updateCart();

</script>

</body>
</html>
