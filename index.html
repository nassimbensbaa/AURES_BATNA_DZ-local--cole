<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر الأدوات المدرسية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#f4f6f8;
  display:flex;
}

/* ===== السلة ===== */
.cart{
  width:260px;
  background:#fff;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  padding:10px;
  overflow:auto;
  border-right:1px solid #eee;
}

.main{
  margin-left:260px;
  width:100%;
  padding:10px;
}

.item{
  border-bottom:1px solid #eee;
  padding:6px 0;
  font-size:13px;
}

.qty button{
  padding:2px 6px;
  margin:2px;
}

/* المنتجات */
.card{
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin:5px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.btn{
  width:100%;
  padding:6px;
  background:#f59e0b;
  color:#fff;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- 🛒 السلة -->
<div class="cart">
  <h3>🛒 السلة</h3>
  <div id="cartItems"></div>

  <hr>

  <div>
    المجموع: <b id="total">0</b><br>
    التوصيل: 200<br>
    الإجمالي: <b id="final">0</b>
  </div>

  <hr>

  <input id="firstName" placeholder="الاسم"><br><br>
  <input id="lastName" placeholder="اللقب"><br><br>
  <input id="phone" placeholder="الهاتف"><br><br>
  <input id="address" placeholder="العنوان"><br><br>

  <button onclick="sendOrder()" class="btn">إرسال الطلب</button>
</div>

<!-- المنتجات -->
<div class="main">
  <div class="products" id="products"></div>
</div>

<script>

/* ===== المنتجات ===== */
const PRODUCTS = [
  {name:"كراس 96 صفحة", price:120},
  {name:"قلم أزرق", price:30},
  {name:"ممحاة", price:50}
];

let cart = [];

/* عرض المنتجات */
function renderProducts(){
  let html = "";
  PRODUCTS.forEach((p,i)=>{
    html += `
      <div class="card">
        <h4>${p.name}</h4>
        <p>${p.price} دج</p>
        <button class="btn" onclick="add(${i})">إضافة</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* إضافة للسلة */
function add(i){
  let p = PRODUCTS[i];
  let f = cart.find(x => x.name === p.name);

  if(f) f.qty++;
  else cart.push({...p, qty:1});

  updateCart();
}

/* تحديث السلة */
function updateCart(){
  let html = "";
  let total = 0;

  cart.forEach((p,i)=>{
    let sub = p.price * p.qty;
    total += sub;

    html += `
      <div class="item">
        ${p.name}<br>
        ${p.price} x ${p.qty} = ${sub}
        <div class="qty">
          <button onclick="change(${i},-1)">-</button>
          <button onclick="change(${i},1)">+</button>
        </div>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = total;
  document.getElementById("final").innerText = total + 200;
}

/* تغيير الكمية */
function change(i,v){
  cart[i].qty += v;
  if(cart[i].qty <= 0) cart.splice(i,1);
  updateCart();
}

/* 🚀 إرسال الطلب (مُصحح 100%) */
async function sendOrder(){

  if(cart.length === 0){
    alert("السلة فارغة!");
    return;
  }

  const total = Number(document.getElementById("final").innerText);

  const payload = {
    firstName: document.getElementById("firstName").value,
    lastName: document.getElementById("lastName").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    shipping: 200,
    total: total,

    // 🔥 أهم جزء (السلة)
    products: cart.map(p => ({
      name: p.name,
      qty: p.qty,
      price: p.price
    }))
  };

  console.log("SEND:", payload);

  try {
    const res = await fetch("/api/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    console.log("RESULT:", data);

    if(data.ok){
      alert("تم إرسال الطلب ✔");
      cart = [];
      updateCart();
    } else {
      alert("فشل الإرسال ❌");
    }

  } catch(err){
    alert("خطأ: " + err.message);
  }
}

/* init */
renderProducts();
updateCart();

</script>

</body>
</html>
